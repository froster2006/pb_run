<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>扫码器 (Fixed ZXing)</title>

<script src="https://unpkg.com/@zxing/browser@latest/umd/index.min.js"></script>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    padding:16px;
    background:#f5f5f5;
}

textarea{
    width:100%;
    height:140px;
    font-size:16px;
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:12px;
}

button{
    width:100%;
    height:50px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#1677ff;
    color:white;
}

button:active{
    background:#0f5fd0;
}

video{
    width:100%;
    margin-top:12px;
    border-radius:10px;
    background:black;
    display:none;
}
</style>
</head>

<body>

<textarea id="out" placeholder="扫描结果..."></textarea>
<button id="btn">开始扫码</button>

<video id="video" autoplay playsinline></video>

<script>

const btn = document.getElementById("btn");
const out = document.getElementById("out");
const video = document.getElementById("video");

let codeReader = null;
let selectedDeviceId = null;
let lastText = "";
let lastTime = 0;

function add(text){
    const now = Date.now();

    // 3秒去重（避免连续重复刷）
    if(text === lastText && now - lastTime < 3000){
        return;
    }

    lastText = text;
    lastTime = now;

    out.value += text + "\n";
    out.scrollTop = out.scrollHeight;

    navigator.vibrate?.(80);
}

async function start(){

    try{

        codeReader = new ZXingBrowser.BrowserMultiFormatReader();

        const devices = await ZXingBrowser.BrowserCodeReader.listVideoInputDevices();

        if(devices.length === 0){
            alert("未找到摄像头");
            return;
        }

        // 优先后置摄像头
        selectedDeviceId =
            devices.find(d => d.label.toLowerCase().includes("back"))?.deviceId
            || devices[0].deviceId;

        video.style.display = "block";

        await codeReader.decodeFromVideoDevice(
            selectedDeviceId,
            video,
            (result, err) => {

                if(result){
                    add(result.getText());
                }

            }
        );

        btn.innerText = "停止扫码";

    }catch(e){
        console.error(e);
        alert("摄像头启动失败，请确认 HTTPS + 权限");
        stop();
    }
}

function stop(){

    if(codeReader){
        codeReader.reset();
        codeReader = null;
    }

    video.style.display = "none";
    btn.innerText = "开始扫码";
}

btn.onclick = () => {
    if(codeReader) stop();
    else start();
};

</script>

</body>
</html>
