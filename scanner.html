<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>扫码（QR/EAN/UPC）</title>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/umd/zxing-browser.min.js"></script>
</head>
<body>
<textarea id="res" style="width:100%;height:120px;"></textarea><br>
<button id="btn" style="width:100%;height:50px;">开始扫码</button>
<video id="v" autoplay playsinline style="width:100%;display:none;"></video>
<div id="err" style="color:red;"></div>

<script>
let v=document.getElementById('v'),
    btn=document.getElementById('btn'),
    res=document.getElementById('res'),
    err=document.getElementById('err');
let reader=null,stream=null,done=false;

function closeCam(){
    done=false;
    if(reader){reader.reset();reader=null;}
    if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
    v.style.display='none';
    btn.innerText='开始扫码';
}

btn.addEventListener('click',async ()=>{
    err.innerText='';
    if(stream) return;
    try{
        btn.innerText='对准条码';
        v.style.display='block';
        stream=await navigator.mediaDevices.getUserMedia({
            video:{facingMode:'environment',width:{ideal:640}}
        });
        v.srcObject=stream;
        reader=new ZXing.BrowserMultiFormatReader();
        done=false;
        reader.decodeFromVideoElement(v,(r,e)=>{
            if(done)return;
            if(r){
                done=true;
                let txt=r.text.trim();
                if(confirm('识别到：\n'+txt+'\n确定添加？')){
                    res.value+=txt+'\n';
                }
                closeCam();
            }
            if(e&&!(e instanceof ZXing.NotFoundException))console.log(e);
        });
    }catch(e){
        closeCam();
        err.innerText='❌ 无法打开摄像头：\n1) 关闭无痕模式\n2) 设置→隐私→相机→开启Firefox\n3) 用HTTPS/localhost打开';
        console.error(e);
    }
})
</script>
</body>
</html>
