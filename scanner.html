<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>扫码（QR/EAN/UPC）</title>

<script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
</head>

<body>
<textarea id="res" style="width:100%;height:120px;"></textarea><br>
<button id="btn" style="width:100%;height:50px;">开始扫码</button>
<div id="err" style="color:red;"></div>
<video id="v" style="width:100%;display:none;"></video>

<script>
let codeReader = null;
let scanning = false;

const v = document.getElementById('v');
const btn = document.getElementById('btn');
const res = document.getElementById('res');
const err = document.getElementById('err');

async function startScan() {
    err.innerText = '';
    v.style.display = 'block';

    codeReader = new ZXing.BrowserMultiFormatReader();

    try {
        scanning = true;

        const devices = await ZXing.BrowserCodeReader.listVideoInputDevices();
        const deviceId = devices.length ? devices[devices.length - 1].deviceId : null;

        codeReader.decodeFromVideoDevice(
            deviceId,
            v,
            (result, error) => {
                if (result) {
                    const txt = result.getText();
                    scanning = false;

                    if (confirm('识别到：\n' + txt + '\n确定添加？')) {
                        res.value += txt + '\n';
                    }

                    stopScan();
                }

                // ignore NotFoundException (normal during scanning)
            }
        );

    } catch (e) {
        console.error(e);
        err.innerText = '❌ 摄像头无法启动：请使用 HTTPS 或 localhost，并允许相机权限';
        stopScan();
    }
}

function stopScan() {
    if (codeReader) {
        codeReader.reset();
        codeReader = null;
    }
    v.style.display = 'none';
    scanning = false;
    btn.innerText = '开始扫码';
}

btn.addEventListener('click', async () => {
    if (scanning) {
        stopScan();
    } else {
        btn.innerText = '停止扫码';
        await startScan();
    }
});
</script>

</body>
</html>
