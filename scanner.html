<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>扫码（QR/EAN/UPC）</title>
    <link rel="stylesheet" href="scanner.css">
    <script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
</head>
<body>

    <h1>📷 扫码（QR / EAN / UPC）</h1>

    <div class="video-wrapper" id="videoWrapper">
        <video id="v"></video>
        <div class="scan-laser"></div>
        <div class="flash-overlay"></div>
    </div>

    <div class="container">
        <textarea id="res" placeholder="扫描结果会显示在这里..."></textarea>
        <div class="button-group">
            <button id="btn">开始扫码</button>
            <button id="btnCopy">复制结果</button>
            <button id="btnPersonalBest">个人最佳时间</button>
        </div>
        <div id="err"></div>
    </div>

    <script src="scanner.js"></script>
    <script>
        document.getElementById('btnPersonalBest').addEventListener('click', async () => {
    const textarea = document.getElementById('res');
    try {
        const response = await fetch('https://0i6hydevx6.execute-api.us-east-1.amazonaws.com/dev/personalBestTime');
        const data = await response.json(); // object with body string
        const items = JSON.parse(data.body);
        // Convert each object to two‑column tab‑separated line (first two fields)
        const formatted = items.map(item => {
            const vals = Object.values(item);
            return vals.slice(0, 2).join('\t');
        }).join('\n');
        textarea.value = formatted;
    } catch (e) {
        textarea.value = 'Error: ' + e;
    }
});
    </script>
    <div id="personalBestMsg" style="margin-top:10px; font-weight:bold;"></div>
</body>
</html>
