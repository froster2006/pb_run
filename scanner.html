<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>扫码器</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f5f5f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    padding:20px;
}

textarea{
    width:100%;
    height:140px;
    padding:12px;
    font-size:16px;
    border-radius:10px;
    border:1px solid #ccc;
    resize:none;
    margin-bottom:20px;
    background:white;
}

button{
    width:100%;
    height:52px;
    border:none;
    border-radius:10px;
    background:#1677ff;
    color:white;
    font-size:18px;
}

button:active{
    background:#005fe0;
}

#reader{
    margin-top:20px;
    display:none;
}

#reader video{
    border-radius:10px;
}

.tip{
    margin-top:15px;
    color:#666;
    text-align:center;
}
</style>

</head>

<body>

<textarea id="resultInput" placeholder="扫码结果（每行一条）"></textarea>

<button id="scanBtn">开启扫码</button>

<div id="reader"></div>

<div class="tip">
支持：
QR Code、Code128、EAN13、EAN8、UPC、Code39 等
</div>

<script>

const resultInput=document.getElementById("resultInput");
const scanBtn=document.getElementById("scanBtn");
const reader=document.getElementById("reader");

let scanner=null;
let scanning=false;
let lastText="";

async function startScanner(){

    reader.style.display="block";

    scanner=new Html5Qrcode("reader");

    try{

        await scanner.start(

            {
                facingMode:"environment"
            },

            {
                fps:10,
                qrbox:{
                    width:250,
                    height:250
                },
                aspectRatio:1.333
            },

            onScanSuccess,

            ()=>{}
        );

        scanning=true;
        scanBtn.innerText="停止扫码";

    }catch(e){

        alert("无法打开摄像头\n\n请确认：\n1. HTTPS\n2. 已允许相机权限");

        stopScanner();

    }

}

async function stopScanner(){

    if(scanner){

        try{
            await scanner.stop();
        }catch(e){}

        try{
            await scanner.clear();
        }catch(e){}

        scanner=null;
    }

    reader.style.display="none";
    scanning=false;
    scanBtn.innerText="开启扫码";

}

function onScanSuccess(decodedText){

    if(decodedText===lastText)
        return;

    lastText=decodedText;

    navigator.vibrate?.(100);

    if(confirm("识别到：\n\n"+decodedText+"\n\n是否添加？")){

        resultInput.value+=decodedText+"\n";
        resultInput.scrollTop=resultInput.scrollHeight;

    }

    setTimeout(()=>{
        lastText="";
    },1000);

}

scanBtn.onclick=()=>{

    if(scanning)
        stopScanner();
    else
        startScanner();

};

</script>

</body>
</html>
