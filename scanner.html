<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>扫码器 (ZXing)</title>

<script src="https://unpkg.com/@zxing/browser@latest/umd/index.min.js"></script>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f5f6f7;
    padding:16px;
}

textarea{
    width:100%;
    height:140px;
    font-size:16px;
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-bottom:12px;
}

button{
    width:100%;
    height:52px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#1677ff;
    color:white;
}

button:active{
    background:#0f5fd0;
}

#video{
    width:100%;
    margin-top:12px;
    border-radius:10px;
    display:none;
    background:black;
}

.tip{
    margin-top:10px;
    font-size:13px;
    color:#666;
}
</style>
</head>

<body>

<textarea id="out" placeholder="扫码结果..."></textarea>
<button id="btn">开启扫码</button>

<video id="video" autoplay playsinline></video>

<div class="tip">
支持 QR / Code128 / EAN13 / UPC / Code39 等（连续扫描模式）
</div>

<script>
const btn=document.getElementById("btn");
const out=document.getElementById("out");
const video=document.getElementById("video");

let reader=null;
let running=false;
let lastMap=new Map(); // text -> timestamp

function beep(){
    try{
        const ctx=new (window.AudioContext||window.webkitAudioContext)();
        const osc=ctx.createOscillator();
        const gain=ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value=800;
        osc.start();
        gain.gain.setValueAtTime(0.1,ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.15);
        osc.stop(ctx.currentTime+0.15);
    }catch(e){}
}

function addCode(text){
    const now=Date.now();

    if(lastMap.has(text) && now-lastMap.get(text)<3000){
        return;
    }

    lastMap.set(text,now);

    out.value += text + "\\n";
    out.scrollTop=out.scrollHeight;

    navigator.vibrate?.(80);
    beep();
}

async function start(){

    reader=new ZXing.BrowserMultiFormatReader();

    video.style.display="block";

    try{

        await reader.decodeFromVideoDevice(
            undefined,
            "video",
            (result,err)=>{

                if(result){
                    const text=result.getText();
                    addCode(text);
                }

            }
        );

        running=true;
        btn.innerText="停止扫码";

    }catch(e){
        alert("无法启动摄像头，请检查 HTTPS 和权限");
        stop();
    }
}

function stop(){

    if(reader){
        reader.reset();
        reader=null;
    }

    running=false;
    video.style.display="none";
    btn.innerText="开启扫码";
}

btn.onclick=()=>{
    if(running) stop();
    else start();
};

</script>

</body>
</html>
