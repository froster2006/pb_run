<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>单次扫码｜QR+条码｜扫完自动关</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{padding:20px;font-family:system-ui,sans-serif;background:#f7f8fa;}
        #resultBox{
            width:100%;height:130px;padding:12px;font-size:16px;
            border:1px solid #ddd;border-radius:10px;margin-bottom:20px;
            outline:none;resize:none;white-space:pre-wrap;background:#fff;
        }
        #scanBtn{
            width:100%;height:52px;background:#1677ff;color:#fff;
            border:none;border-radius:10px;font-size:17px;
        }
        #scanBtn:active{background:#0f5fcc;}
        .scanView{width:100%;margin-top:20px;position:relative;display:none;}
        #video{width:100%;border-radius:10px;background:#000;object-fit:cover;}
        .focusBox{
            position:absolute;left:50%;top:50%;
            width:230px;height:230px;
            transform:translate(-50%,-50%);
            border:2px solid #00e676;border-radius:8px;
            box-shadow:0 0 0 9999px rgba(0,0,0,0.6);
        }
        .focusBox::after{
            content:"";position:absolute;left:0;top:0;width:100%;height:3px;
            background:#00e676;animation:scanMove 1.5s infinite linear;
        }
        @keyframes scanMove{
            0%{top:0;}100%{top:calc(100% - 3px);}
        }
        .errTip{color:#d93025;margin-top:15px;font-size:14px;display:none;padding:10px;background:#ffeaea;border-radius:6px;}
        #canvas{display:none;}
    </style>
</head>
<body>
    <textarea id="resultBox" placeholder="扫码结果逐行显示在这里"></textarea>
    <button id="scanBtn">点击开始扫码</button>

    <div class="scanView" id="scanView">
        <video id="video" autoplay playsinline muted></video>
        <div class="focusBox"></div>
    </div>
    <canvas id="canvas"></canvas>
    <div class="errTip" id="errTip"></div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scanBtn = document.getElementById('scanBtn');
const resultBox = document.getElementById('resultBox');
const scanView = document.getElementById('scanView');
const errTip = document.getElementById('errTip');

let mediaStream = null;
let scanning = false;

function closeCamera(){
    scanning = false;
    if(mediaStream){
        mediaStream.getTracks().forEach(t=>t.stop());
        mediaStream = null;
    }
    scanView.style.display = 'none';
    scanBtn.innerText = '点击开始扫码';
}

scanBtn.addEventListener('click', async () => {
    errTip.style.display = 'none';
    if(mediaStream) return;

    try{
        scanBtn.innerText = '对准条码扫描';
        scanView.style.display = 'block';

        mediaStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: 480 }
        });

        video.srcObject = mediaStream;
        scanning = true;

        function scanFrame(){
            if(!scanning) return;
            if(video.videoWidth < 10){
                requestAnimationFrame(scanFrame);
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.drawImage(video,0,0);
            let img = ctx.getImageData(0,0,canvas.width,canvas.height);

            let qr = jsQR(img.data, canvas.width, canvas.height);
            if(qr && qr.data){
                scanning = false;
                let code = qr.data.trim();
                let ok = confirm(`识别到：\n${code}\n确认添加？`);
                if(ok){
                    resultBox.value += code + '\n';
                    resultBox.scrollTop = resultBox.scrollHeight;
                }
                closeCamera();
                return;
            }

            requestAnimationFrame(scanFrame);
        }
        scanFrame();

    }catch(e){
        closeCamera();
        errTip.innerText = 
            '❌ 无法打开摄像头：\n' +
            '1) 关闭 Firefox 无痕模式\n' +
            '2) iPhone 设置→隐私→相机→开启 Firefox\n' +
            '3) 刷新页面再试';
        errTip.style.display = 'block';
        console.error(e);
    }
})
</script>
</body>
</html>
