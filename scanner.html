<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>带取景框连续扫码</title>
    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/zxing-browser.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{padding:20px;font-family:-apple-system,sans-serif;background:#f7f8fa;}
        #resultInput{
            width:100%;height:130px;padding:12px;font-size:16px;
            border:1px solid #e5e7eb;border-radius:10px;margin-bottom:20px;
            outline: none;resize:none;white-space:pre-wrap;background:#fff;
        }
        #scanBtn{
            width:100%;height:52px;background:#1677ff;color:#fff;
            border:none;border-radius:10px;font-size:17px;
        }
        #scanBtn:active{background:#0f5fcc;}
        .video-wrap{
            width:100%;margin-top:20px;position:relative;display:none;
        }
        video{
            width:100%;border-radius:10px;background:#000;object-fit:cover;
        }
        /* 绿色扫码聚焦框 */
        .scan-box{
            position:absolute;
            left:50%;top:50%;
            width:220px;height:220px;
            transform:translate(-50%,-50%);
            border:2px solid #00e676;
            box-shadow:0 0 0 9999px rgba(0,0,0,0.5);
            border-radius:6px;
        }
        .scan-box::before{
            content:'';position:absolute;left:0;top:0;width:100%;height:3px;
            background:#00e676;animation:scanLine 1.5s infinite linear;
        }
        @keyframes scanLine{
            0%{top:0;}100%{top:calc(100% - 3px);}
        }
        .warn-tip{
            color:#e53e3e;margin-top:16px;line-height:1.7;
            font-size:14px;display:none;padding:14px;background:#fff2f2;border-radius:8px;
        }
    </style>
</head>
<body>
    <textarea id="resultInput" placeholder="确认后的扫码内容逐行显示在这里..."></textarea>
    <button id="scanBtn">开启连续扫码</button>

    <div class="video-wrap" id="videoWrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="scan-box"></div>
    </div>

    <div class="warn-tip" id="tipBox"></div>

<script>
const video = document.getElementById('video');
const scanBtn = document.getElementById('scanBtn');
const resultInput = document.getElementById('resultInput');
const videoWrap = document.getElementById('videoWrap');
const tipBox = document.getElementById('tipBox');

let codeReader = null;
let isRunning = false;
let lastCode = '';
const coolTime = 1200;

// 彻底关闭摄像头
function stopAllCamera(){
    if(codeReader){
        codeReader.reset();
        codeReader = null;
    }
    if(video.srcObject){
        video.srcObject.getTracks().forEach(t=>t.stop());
        video.srcObject = null;
    }
    isRunning = false;
    videoWrap.style.display = 'none';
    scanBtn.innerText = '开启连续扫码';
}

scanBtn.addEventListener('click',async ()=>{
    tipBox.style.display = 'none';
    if(isRunning){
        stopAllCamera();
        return;
    }

    try{
        isRunning = true;
        scanBtn.innerText = '停止扫码';
        videoWrap.style.display = 'block';

        // 相机配置
        const constraints = {
            video:{
                facingMode:'environment',
                width:{ideal:720},
                height:{ideal:960}
            }
        };
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;

        // 初始化识别器
        codeReader = new ZXing.BrowserMultiFormatReader();
        codeReader.decodeFromVideoElement(video,(res,err)=>{
            if(res){
                let codeVal = res.text.trim();
                if(!codeVal || codeVal === lastCode) return;
                lastCode = codeVal;

                // 弹出对话框确认
                let confirmTxt = confirm(`识别成功！\n内容：${codeVal}\n\n点击确定添加到列表`);
                if(confirmTxt){
                    resultInput.value += codeVal + '\n';
                    resultInput.scrollTop = resultInput.scrollHeight;
                }
                setTimeout(()=>lastCode='',coolTime);
            }
            if(err && !(err instanceof ZXing.NotFoundException)){}
        })
    }catch(err){
        stopAllCamera();
        let msg = '';
        if(err.name === 'NotAllowedError' || err.name === 'OverconstrainedError'){
            msg = 'iOS Firefox设置：\n1.关闭无痕模式\n2.设置开启Firefox相机权限\n3.网页锁图标打开相机权限';
        }else{
            msg = '摄像头调用失败，请检查权限';
        }
        tipBox.innerText = msg;
        tipBox.style.display = 'block';
    }
})
</script>
</body>
</html>
