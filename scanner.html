<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>连续扫码器</title>
    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@latest/umd/zxing-browser.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{padding:20px;font-family:-apple-system,sans-serif;}
        #resultInput{
            width:100%;height:120px;padding:12px;font-size:16px;
            border:1px solid #ddd;border-radius:10px;margin-bottom:20px;
            outline: none;resize:none;white-space:pre-wrap;
        }
        #scanBtn{
            width:100%;height:52px;background:#2563eb;color:#fff;
            border:none;border-radius:10px;font-size:17px;
        }
        #scanBtn:active{background:#1d4ed8;}
        #videoBox{width:100%;margin-top:20px;display:none;}
        video{width:100%;border-radius:10px;background:#000;}
        .warn-tip{
            color:#dc2626;margin-top:16px;line-height:1.6;
            font-size:14px;display:none;padding:12px;background:#fef2f2;border-radius:8px;
        }
    </style>
</head>
<body>
    <textarea id="resultInput" placeholder="扫码结果逐行显示在这里"></textarea>
    <button id="scanBtn">开启连续扫码</button>
    <div id="videoBox">
        <video id="video" autoplay playsinline muted></video>
    </div>
    <div class="warn-tip" id="tipBox"></div>

<script>
const video = document.getElementById('video');
const scanBtn = document.getElementById('scanBtn');
const resultInput = document.getElementById('resultInput');
const videoBox = document.getElementById('videoBox');
const tipBox = document.getElementById('tipBox');

let codeReader = null;
let isScanning = false;
let lastCode = "";
let lockTime = 800; // 防重复扫码间隔

// 停止扫码
function stopScan(){
    if(codeReader){
        codeReader.reset();
        codeReader = null;
    }
    isScanning = false;
    videoBox.style.display = 'none';
    scanBtn.innerText = '开启连续扫码';
}

scanBtn.addEventListener('click',async ()=>{
    tipBox.style.display = 'none';
    if(isScanning){
        stopScan();
        return;
    }

    try{
        isScanning = true;
        scanBtn.innerText = '停止扫码';
        videoBox.style.display = 'block';

        codeReader = new ZXing.BrowserMultiFormatReader();
        codeReader.decodeFromVideoDevice(
            null,
            video,
            (result, err) => {
                if(result){
                    let currCode = result.text.trim();
                    // 防短时间重复扫同一个码
                    if(currCode && currCode !== lastCode){
                        lastCode = currCode;
                        // 换行追加
                        resultInput.value += currCode + "\n";
                        // 光标自动跳到最后
                        resultInput.scrollTop = resultInput.scrollHeight;
                        // 冷却防连发
                        setTimeout(()=> lastCode = "", lockTime);
                    }
                }
                if(err && !(err instanceof ZXing.NotFoundException)){
                    console.log(err)
                }
            }
        )
    }catch(e){
        isScanning = false;
        let info = '';
        if(e.name === 'NotAllowedError'){
            info = `【iOS Firefox 权限】
1. 设置→隐私→相机 开启Firefox
2. 页面点地址栏小锁，相机设为允许`;
        }else{
            info = '调用摄像头失败，请检查权限';
        }
        tipBox.innerText = info;
        tipBox.style.display = 'block';
    }
});
</script>
</body>
</html>
