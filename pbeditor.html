<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>PB Run 编辑器</title>
    <link rel="stylesheet" href="pbeditor.css">
</head>

<body>

    <div class="page-header">
        <h1>PB Run 编辑器</h1>
        <button id="addRecordBtn" class="title-action-btn" type="button">＋ 新增记录</button>
    </div>

    <div class="container">
        <div id="personalBestResult"></div>
            <div class="button-group">
            </div>
        <div id="err"></div>
    </div>

    <!-- ── Edit Modal ─────────────────────────────────── -->
    <div id="editBackdrop" class="edit-backdrop" hidden>
        <div class="edit-modal" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
            <div class="edit-modal-header">
                <div class="edit-modal-title-wrap">
                    <span class="edit-medal">🏅</span>
                    <span id="editModalTitle" class="edit-modal-title">编辑记录</span>
                </div>
                <div class="edit-modal-actions">
                    <button class="edit-close-btn" id="editCloseBtn" title="关闭">✕</button>
                </div>
            </div>
            <div class="edit-modal-body">
                <label class="edit-label">次数</label>
                <input id="editCount" class="edit-input" type="text" placeholder="次数">
                <label class="edit-label">最佳时间</label>
                <input id="editPBTime" class="edit-input" type="text" placeholder="mm:ss.ff">
                <label class="edit-label">PB 日期</label>
                <input id="editPBDate" class="edit-input" type="text" placeholder="yyyy-mm-dd">
            </div>
            <div class="edit-modal-footer">
                <button class="edit-delete-btn" id="editDeleteBtn" title="删除记录">🗑 删除此人</button>
                <button class="edit-save-btn" id="editSaveBtn">✔ 保存</button>
            </div>
        </div>
    </div>

    <!-- ── Add Modal ──────────────────────────────────── -->
    <div id="addBackdrop" class="edit-backdrop" hidden>
        <div class="edit-modal" role="dialog" aria-modal="true" aria-labelledby="addModalTitle">
            <div class="edit-modal-header">
                <div class="edit-modal-title-wrap">
                    <span class="edit-medal">➕</span>
                    <span id="addModalTitle" class="edit-modal-title">新增记录</span>
                </div>
                <div class="edit-modal-actions">
                    <button class="edit-close-btn" id="addCloseBtn" title="关闭">✕</button>
                </div>
            </div>
            <div class="edit-modal-body">
                <label class="edit-label">微信ID</label>
                <input id="addWexinID" class="edit-input" type="text" placeholder="微信ID">
                <label class="edit-label">次数</label>
                <input id="addCount" class="edit-input" type="text" placeholder="次数">
                <label class="edit-label">最佳时间</label>
                <input id="addPBTime" class="edit-input" type="text" placeholder="mm:ss.ff">
                <label class="edit-label">PB 日期</label>
                <input id="addPBDate" class="edit-input" type="text" placeholder="yyyy-mm-dd">
            </div>
            <div class="edit-modal-footer">
                <button class="edit-save-btn" id="addSaveBtn">✔ 保存</button>
            </div>
        </div>
    </div>

    <script src="pbeditor.js"></script>
</body>

</html>
