<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PB Run 本周成绩</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>PB Run 本周成绩</h2>
        <div class="date-row">
            <label for="dateInput">日期</label>
            <input id="dateInput" type="date">
        </div>


        <div class="box-item">
            <label>数据1：ID与名次交替行</label>
            
            <textarea id="text1" placeholder="示例：
        RunnerA
        1
        RunnerB
        2"></textarea>
        </div>
        
        <div class="box-item">
            <label>数据2：单行 名次 时间 diff</label>
            <textarea id="text2" placeholder="示例：
        01 15:20 +00:05
        02 16:10 -00:03"></textarea>
        </div>
        
        
        <div class="box-item">
            <label>数据3：ID PB时间</label>
            <div class="textarea-row">
                <textarea id="text3" placeholder="示例：
        RunnerA	12:37.23
        RunnerB	19:02.67"></textarea>
                <button id="loadPbBtn" class="btn-load-pb" type="button">
                    <span class="scan-icon">📥</span>
                    <span class="scan-text">Load PB</span>
                </button>
            </div>
        </div>

        <div class="btn-wrap">
            <button class="btn-generate" onclick="makeTable()">生成表格</button>
            <button class="btn-export" onclick="exportExcel()">导出Excel</button>
        </div>
        <div class="table-title" id="tableHeader"></div>
        <table id="resultTable">
            <tbody id="tableBody"></tbody>
        </table>
    <script src="script.js"></script>
</body>
</html>
